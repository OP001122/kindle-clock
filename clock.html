    <title>时钟</title>

    <style>
        body {

          transition: all 0.5s ease;
        }

        body.dark-mode {
          color: #ffffff;
          background-color: #000000;
        }

        body.dark-mode .footer_text {
          color: #666666;
        }

        html {
          font-size: 16px;
        }

        .page {
          position: fixed;
          width: 100%;
          height: 100%;
        }

        .time_container,
        .date_container {
          width: 100%;
          margin: auto;
          text-align: center;
        }

        .time_container {
          top: 0;
          height: 52%;
        }

        .date_container {
        }

        .time {
          padding-top: 50px;
          font-size: 14rem;
        }

        .quote {
          padding-top: 15px;
          font-size: 1.2rem;
          font-weight: bold;
          font-family: "仿宋", "FangSong", "STFangsong", serif;

          max-width: 80%;
          margin: 0 auto;
          line-height: 1.6;
        }

        .date {
          padding-top: 10px;
          font-size: 4rem;
        }

        .week {
          padding-top: 10px;
          font-size: 3rem;
        }

        .footer_text {
          padding-top: 10px;
          font-size: 1.2rem;
          color: #999999;
          font-weight: bold;
        }

        .toggle_button {
          padding-top: 10px;
          font-size: 1rem;
          color: #666666;
          cursor: pointer;
          text-decoration: underline;
        }

        body.dark-mode .toggle_button {
          color: #444444;
        }

        .wss_r90 {
            -webkit-transform: rotate(90deg);
            -moz-transform: rotate(90deg);
            -o-transform: rotate(90deg);
            -ms-transform: rotate(90deg);
            transform: rotate(90deg);
        }
    </style>
</head>

<body>

      </div>

      <div class="date_container">

      var currentQuoteIndex = -1;

      function getRandomQuote() {
        var newIndex;
        do {
          newIndex = Math.floor(Math.random() * quotes.length);
        } while (newIndex === currentQuoteIndex && quotes.length > 1);
        currentQuoteIndex = newIndex;
        return quotes[newIndex];
      }

      function changeQuote() {
        document.getElementById("quote").innerHTML = getRandomQuote();
      }

      function toggleDarkMode() {
        document.body.classList.toggle("dark-mode");
      }

      function update() {
        var date = new Date()
        var utc8DiffMinutes = date.getTimezoneOffset() + 480
        date.setMinutes(date.getMinutes() + utc8DiffMinutes)

        var timeString = ('0' + date.getHours()).slice(-2) + ':' + ('0' + date.getMinutes()).slice(-2);
        var dateString = (date.getMonth() + 1) + '月' + date.getDate() + '日'
        var weekList = ['星期日', '星期一', '星期二', '星期三', '星期四', '星期五', '星期六']
        var weekString = weekList[date.getDay()]

        document.getElementById("time").innerHTML = timeString;
        document.getElementById("date").innerHTML = dateString;
        document.getElementById("week").innerHTML = weekString;
      }

      update();
      changeQuote();
      setInterval("update()", 60 * 1000);
      setInterval("changeQuote()", 60 * 60 * 1000);
      setInterval("location.reload()", 60 * 1000);
    </script>
</body>
</html>
